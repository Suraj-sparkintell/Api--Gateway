server:
  port: 8085
spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: product-service
          uri: lb://PRODUCT-SERVICE
          predicates:
            - Path=/products/**
          filters:
            - AddRequestHeader=X-Request-Source, Gateway
            - RewritePath=/products/(?<segment>.*), /${segment}

        
        - id: order-service
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/order/**
        
        - id: customer-service
          uri: lb://CUSTOMER-SERVICE
          predicates:
            - Path=/customer/**
        
        - id: inventory-service
          uri: lb://INVENTORY-SERVICE
          predicates:
            - Path=/inventory/**
        
        - id: payment-service
          uri: lb://PAYMENT-SERVICE
          predicates:
            - Path=/payment/**
          
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
